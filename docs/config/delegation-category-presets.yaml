#       responsibility: >
#         Synthesize an evidence-backed answer from files and the web without
#         executing or mutating anything; return sources, findings,
#         recommendation, and confidence.
#       category: writing
#       prompt_sections:
#         recipe: researcher
#       allowed_toolsets: [file, search, web]
#       workspace_policy:
#         kind: scratch
#         mutate: false
#       verification_policy:
#         require_evidence: true
#         on_unverifiable: report
#       handoff_schema:
#         findings: list
#         blockers: list
#       approval_gates: [push, merge, publish, send_message]
