# =============================================================================
# Hermes Delegation Category Presets (safe, copy-paste examples)
# =============================================================================
# Clean-room notice:
#   These categories and recipe names are Hermes-native concepts. Nothing here
#   is copied from any external project's code or prompts; the names map only to
#   the built-in recipes defined in tools/agent_recipes.py and the resolver in
#   tools/delegation_categories.py.
#
# What this file is:
#   A drop-in `delegation:` block you can merge into ~/.hermes/config.yaml to
#   turn on the optional delegation capability layer. A category bundles a
#   provider/model + runtime budget + toolset scope under a short intent name,
#   so the agent can delegate by intent ("quick", "deep", "review", "visual",
#   "writing") instead of wiring providers ad hoc on every call.
#
# Safety properties (enforced by resolve_delegation_category):
#   * Every category sets `toolsets_mode: intersect`. Categories may only ever
#     narrow toolset scope, never escalate it. The effective scope is
#     category ∩ parent ∩ caller-requested.
#   * No credentials live here. There are intentionally no secret, password, or
#     direct endpoint keys. Provider/model values are plain identifiers; real
#     credentials stay in ~/.hermes/.env (represented as [REDACTED] in prose).
#   * No analytics or data collection of any kind.
#
# How to use:
#   1. Copy the `delegation:` block below into ~/.hermes/config.yaml (merge it
#      with any existing `delegation:` settings — `model`/`provider` still work).
#   2. `default_category: quick` opts in globally for fast, narrow delegation.
#      Set it to "" if you prefer per-call category selection only.
#   3. Delete `default_category` and `categories` to revert to legacy behavior.
#
# Future direction (RFC, no behavior change):
#   Each category below maps one-to-one onto a future *capability profile* — a
#   single named record that also carries responsibility, workspace/verification
#   policy, handoff schema, and approval gates. The mapping is additive and
#   backward-compatible; this file keeps working unchanged. See
#   docs/architecture/capability-profiles.md for the schema and crosswalk.
# =============================================================================

delegation:
  # Opt-in switch. Set to a category name below to make every delegate_task
  # default to that intent. Use "" for legacy/per-call-only routing.
  default_category: quick

  # Named delegation categories. Each one is optional and independent.
  categories:
    # quick — cheap/fast leaf work: small edits, lookups, mechanical fixes.
    quick:
      recipe: focused-executor          # read-write leaf, scoped to the goal
      provider: openrouter              # example identifier only — no credentials
      model: "google/gemini-3-flash-preview"
      reasoning_effort: low
      max_iterations: 20
      child_timeout_seconds: 300
      toolsets_mode: intersect          # narrow only, never escalate
      toolsets: [file, search]
      fallback_chain:
        - provider: openrouter          # safe metadata only: provider/model IDs
          model: "google/gemini-3-flash-preview"

    # deep — long, high-effort work: multi-file refactors, hard debugging.
    deep:
      recipe: deep-worker               # read-write leaf with a generous budget
      reasoning_effort: high
      max_iterations: 80
      child_timeout_seconds: 1200
      toolsets_mode: intersect
      toolsets: [file, search, terminal, web]

    # review — read-only critique. Deliberately omits `terminal` so a reviewer
    # cannot run or mutate anything; pairs with the critic-reviewer recipe.
    review:
      recipe: critic-reviewer           # read-only critic posture
      reasoning_effort: high
      max_iterations: 40
      child_timeout_seconds: 600
      toolsets_mode: intersect
      toolsets: [file, search]          # no terminal — review must not execute

    # visual — screenshots, diagrams, UI inspection, image understanding.
    visual:
      recipe: explorer                  # read-only investigator
      reasoning_effort: medium
      max_iterations: 30
      child_timeout_seconds: 600
      toolsets_mode: intersect
      toolsets: [vision, browser, file]

    # writing — drafting prose/docs from gathered sources.
    writing:
      recipe: researcher                # read-only gather-and-draft posture
      reasoning_effort: medium
      max_iterations: 40
      child_timeout_seconds: 600
      toolsets_mode: intersect
      toolsets: [file, search, web]

# =============================================================================
# Optional Capability Profile examples (Phase 13 schema)
# =============================================================================
# This `capabilities:` block is independent from `delegation:`. Leaving
# `default_profile` empty preserves legacy behavior. A profile may reference one
# of the categories above, then add responsibility, workspace/verification
# policy, handoff schema, approval gates, and safe fallbacks.
#
# Safety properties (enforced by resolve_capability_profile):
#   * Toolsets still use intersect-only semantics: profile ∩ category ∩ parent ∩
#     caller-requested. Profiles and fallbacks may narrow only.
#   * Unknown toolsets, unsafe approval gate names, env/secret injection fields,
#     and recursive fallback profile loops fail before any child spawn.
#   * Provider/model values are plain identifiers only. Credentials stay outside
#     config and are never written here.
#
# How to use:
#   1. Keep `default_profile: ""` for per-call opt-in, or set `quick`/`review`.
#   2. Override only fields you own. Omitted provider/model inherits existing
#      delegation or parent routing.
#   3. Delete the `capabilities:` block to revert fully.
#
# capabilities:
#   default_profile: ""
#   profiles:
#     review:
#       responsibility: >
#         Read changed files and report correctness, security, and style defects
#         without executing commands or mutating files.
#       category: review
#       prompt_sections:
#         recipe: critic-reviewer
#       allowed_toolsets: [file, search]
#       budget:
#         reasoning_effort: high
#         max_iterations: 40
#         child_timeout_seconds: 600
#       workspace_policy:
#         kind: scratch
#         mutate: false
#       verification_policy:
#         require_evidence: true
#         on_unverifiable: report
#       handoff_schema:
#         findings: list
#         blockers: list
#       approval_gates: [push, merge, publish, send_message]
#       fallbacks:
#         - provider: openrouter
#           model: "google/gemini-3-flash-preview"
#
#     quick:
#       responsibility: >
#         Complete small scoped implementation, lookup, or mechanical fix tasks.
#       category: quick
#       prompt_sections:
#         recipe: focused-executor
#       allowed_toolsets: [file, search]
#       workspace_policy:
#         kind: scratch
#         mutate: true
#
#     implementation:
#       responsibility: >
#         Make a scoped code change and verify it with focused tests; return
#         changed files, commands run, test results, risks, and blockers.
#       category: deep
#       prompt_sections:
#         recipe: deep-worker
#       allowed_toolsets: [terminal, file, search]
#       workspace_policy:
#         kind: worktree
#         mutate: true
#       verification_policy:
#         require_evidence: true
#         on_unverifiable: fail
#       handoff_schema:
#         changed_files: list
#         commands_run: list
#         blockers: list
