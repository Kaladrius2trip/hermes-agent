#       category: deep
#       prompt_sections:
#         recipe: focused-executor
#       allowed_toolsets: [terminal, file, search]
#       workspace_policy:
#         kind: worktree
#         mutate: true
#       verification_policy:
#         require_evidence: true
#         on_unverifiable: report
